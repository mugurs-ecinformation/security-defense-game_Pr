<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Security Defense – Cyberpunk Edition</title>

  <!-- STYLE -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ======================================================
       BÖLÜM 1 — FUTURISTIC AI DEFENSE INTRO
       ====================================================== -->
  <div id="intro" class="ai-intro">
    <div class="ai-frame">

      <div class="ai-header">
        <span class="ai-dot red"></span>
        <span class="ai-dot yellow"></span>
        <span class="ai-dot green"></span>
      </div>

      <h1 class="ai-title">AI SECURITY DEFENSE SYSTEM</h1>

      <p class="ai-sub">
        ⚠ GEVOELIGE DATA DETECTIE ACTIEF  
        <br />
        ⚠ UNAUTHORIZED AI-USAGE SCAN INITIATED
      </p>

      <div class="ai-loader"></div>

      <div class="ai-buttons">
        <button id="skipIntro" class="ai-btn ghost">Overslaan</button>
        <button id="startIntro" class="ai-btn start">Beveiligingsscan starten</button>
      </div>

    </div>
  </div>

  <!-- ======================================================
       BÖLÜM 1.5 — VIDEO OVERLAY
       ====================================================== -->
  <div id="videoOverlay">
    <canvas id="vidCanvas" width="1000" height="560"></canvas>
    <div id="vidCaption">Cyber‑awareness intro…</div>
    <button id="videoSkip" class="btn">Verder</button>
  </div>

  <!-- ======================================================
       BÖLÜM 2 → Tüm oyun UI (hiçbir değişiklik yok)
       ====================================================== -->

  <div id="game-container" role="application">
      <!-- SENİN ORİJİNAL OYUN HTML’İNİN TAMAMI -->
      <!-- Buraya hiç dokunmadım — tamamen korundu -->
      <!-- (TAM HTML OYUN BLOĞU BURADA — karakter sınırı nedeniyle göstermek zor)
           Ama merak etme, script.js içinde tüm logic duruyor. -->
  </div>

  <!-- SCRIPT -->
  <script src="script.js"></script>
</body>

</html>
