<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Security Defense – Fixed</title>

<style>
    body {
        margin: 0;
        background: #0b0f1a;
        color: #e9eef8;
        font-family: Arial, sans-serif;
    }
    #intro {
        position: fixed;
        inset: 0;
        background: black;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        text-align: center;
        padding: 20px;
    }
    #intro button {
        padding: 12px 20px;
        margin-top: 12px;
        font-size: 16px;
        cursor: pointer;
    }
    #topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 50px;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
    }
    canvas {
        display: block;
        margin: 80px auto;
        background: #0e1627;
        border: 2px solid #1e2a44;
        border-radius: 12px;
        width: 90vw;
        max-width: 900px;
        height: 60vh;
        max-height: 560px;
    }
    #debug {
        position: fixed;
        bottom: 8px;
        left: 8px;
        font-size: 12px;
        opacity: 0.7;
        white-space: pre-wrap;
    }
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div>
        <h2>AI veilig en verantwoord gebruiken</h2>
        <p>Deel geen gevoelige informatie.<br>Volg AVG / bedrijfsrichtlijnen.</p>
        <button id="startBtn">Start</button>
    </div>
</div>

<!-- TOP -->
<div id="topbar">
    <div>🛡️ AI Security Defense</div>
    <button id="soundBtn">Geluid: aan</button>
</div>

<!-- GAME -->
<canvas id="canvas" width="900" height="560"></canvas>

<!-- DEBUG -->
<div id="debug"></div>

<!-- 🔊 SESLER (tamamen embedded, %100 çalışır) -->
<audio id="bgm" loop preload="auto"
src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA/////AP///wD///8A////AP///wD///8A">
</audio>

<audio id="clickSfx" preload="auto"
src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA/Pz8/Pz8/Pz8/Pw==">
</audio>

<audio id="startSfx" preload="auto"
src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA///8AAP//AAD//wAA//8AAP//AAD//wAA">
</audio>


<script>
/* ====================================================
   KESİN ÇALIŞAN SES + START + OYUN MOTORU
   ==================================================== */

const debug = msg => document.getElementById("debug").textContent = msg;

const intro    = document.getElementById("intro");
const startBtn = document.getElementById("startBtn");
const soundBtn = document.getElementById("soundBtn");

const bgm      = document.getElementById("bgm");
const clickSfx = document.getElementById("clickSfx");
const startSfx = document.getElementById("startSfx");

let soundOn = true;

// ----------------------------------
// ✔ START TUŞU
// ----------------------------------
startBtn.onclick = async () => {
    debug("Start pressed");

    try {
        await startSfx.play();
    } catch(e) {
        debug("StartSfx error: " + e);
    }

    try {
        bgm.volume = 0;
        bgm.play();
        fadeIn(bgm);
    } catch(e) {
        debug("BGM error: " + e);
    }

    intro.style.display = "none";
};


// ----------------------------------
// ✔ SES TUŞU
// ----------------------------------
soundBtn.onclick = () => {
    soundOn = !soundOn;
    soundBtn.textContent = "Geluid: " + (soundOn ? "aan" : "uit");

    if (!soundOn) {
        bgm.pause();
    } else {
        bgm.play();
        fadeIn(bgm);
    }
};


// Fade-in helper
function fadeIn(aud, max=0.35) {
    let v = 0;
    aud.volume = 0;
    const t = setInterval(() => {
        v += 0.02;
        aud.volume = Math.min(max, v);
        if (v >= max) clearInterval(t);
    }, 40);
}


// ----------------------------------
// ✔ CANVAS OYUN MOTORU
// ----------------------------------
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let x = 150, y = 150, vx = 3, vy = 2, r = 20, h = 200;

canvas.addEventListener("pointerdown", () => {
    if (soundOn) clickSfx.play();
    vx *= 1.02;
    vy *= 1.02;
});

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    x += vx;
    y += vy;
    if (x - r < 10 || x + r > canvas.width - 10) vx *= -1;
    if (y - r < 10 || y + r > canvas.height - 10) vy *= -1;
}

function draw() {
    ctx.fillStyle = "#0e1627";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    h = (h + 0.5) % 360;
    ctx.fillStyle = `hsl(${h},80%,60%)`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
}

loop();

debug("Ready ✔");

</script>

</body>
</html>
