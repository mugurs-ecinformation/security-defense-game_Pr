<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Security Defense – v2 (Skeleton)</title>
  <style>
    :root{ --bg:#0b0f1a; --fg:#e9eef8; --accent:#35c0ff; --glass:rgba(255,255,255,.12); }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
    /* Top bar */
    #topbar{
      position:fixed; top:0; left:0; right:0; height:56px; display:flex;
      align-items:center; justify-content:space-between; padding:0 12px;
      background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,0)); z-index:10;
    }
    #brand{ font-weight:700; color:var(--accent); }
    #soundBtn{
      background:var(--glass); color:var(--fg); border:1px solid #5a6b85;
      padding:8px 12px; border-radius:8px; cursor:not-allowed; opacity:.5;
    }
    /* Game area */
    #game{ position:relative; width:100%; height:100%; display:flex;
      align-items:center; justify-content:center; }
    canvas{ width:min(96vw,900px); height:min(68vh,560px); background:#0e1627;
      border:1px solid #1e2a44; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.35);}
    #hint{ position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
      color:#a8b3c7; font-size:14px; opacity:.9; text-align:center; padding:0 8px;}
    footer{ position:fixed; right:10px; bottom:8px; font-size:12px; color:#9bb0ca80; }
    a, a:visited{ color:#7cffb9; text-decoration:none; }
  </style>
</head>
<body>
  <!-- TOP BAR -->
  <div id="topbar" role="toolbar" aria-label="Game toolbar">
    <div id="brand">🛡️ AI Security Defense (v2)</div>
    <!-- Adım 2’de aktifleşecek -->
    <button id="soundBtn" type="button" aria-pressed="false" disabled>Geluid: uit</button>
  </div>

  <!-- GAME AREA -->
  <div id="game">
    <canvas id="canvas" width="900" height="560" aria-label="Game canvas"></canvas>
    <div id="hint">
      Bu iskelet sürüm çalışıyor mu? GitHub Pages linkinden kontrol et.<br/>
      Sonraki adımda: intro video + ses (autoplay uyumlu) ekleyeceğiz.
    </div>
  </div>

  <footer>© 2026 • v2 skeleton</footer>

  <script>
    // Basit “oyun” döngüsü: zıplayan top (placeholder)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let x = 160, y = 140, vx = 2.8, vy = 2.1, r = 20;
    let hue = 200;

    function draw(){
      ctx.fillStyle = '#0e1627';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      hue = (hue + 0.4) % 360;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.closePath();
      ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
      ctx.fill();

      ctx.strokeStyle = '#1e2a44';
      ctx.lineWidth = 2;
      ctx.strokeRect(8,8,canvas.width-16,canvas.height-16);
    }

    function update(){
      x += vx; y += vy;
      if (x - r < 10 || x + r > canvas.width - 10) vx *= -1;
      if (y - r < 10 || y + r > canvas.height - 10) vy *= -1;
    }

    function loop(){
      update();
      draw();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
